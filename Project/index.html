<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Down Tower Defense</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="mainMenu" class="menu-screen">
    <h1>Top Down Tower Defense</h1>

    <div class="menu-box">
      <h2>Select Gamemode</h2>

      <button onclick="startGame('normal')">Normal Mode</button>
      <button onclick="startGame('hard')">Hard Mode</button>
      <button onclick="startGame('endless')">Endless Mode</button>
    </div>
  </div>

  <div id="mapMenu" class="menu-screen" style="display:none;">

  <h1>Select Map</h1>

  <div class="menu-box">

    <button onclick="loadMap('classic')">
      Classic Valley
    </button>

    <button onclick="loadMap('snake')">
      Snake Road
    </button>

    <button onclick="loadMap('cross')">
      Crossroads
    </button>

    <button onclick="loadMap('spiral')">
      Spiral Path
    </button>

  </div>

</div>

  <div id="gameUI">
    <div class="topbar">
      <div>
        🗺 Map:
      <span id="mapName"></span>
      </div>
      <div>❤ Health: <span id="health">100</span></div>
      <div>💰 Gold: <span id="gold">300</span></div>
      <div>🌊 Wave: <span id="wave">1</span></div>
    </div>

    <div class="tower-buttons">
      <button onclick="selectTower('basic')">Basic Tower ($100)</button>
      <button onclick="selectTower('rapid')">Rapid Tower ($150)</button>
      <button onclick="selectTower('sniper')">Sniper Tower ($250)</button>
      <button onclick="selectTower('splash')">Splash Tower ($300)</button>
<button onclick="selectTower('freeze')">Freeze Tower ($275)</button>
<button onclick="selectTower('laser')">Laser Tower ($500)</button>
<button onclick="selectTower('poison')">Poison Tower ($350)</button>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="endScreen" class="end-screen">
  <h1 id="endTitle">Game Over</h1>
  <p id="endStats"></p>

  <button onclick="location.reload()">
    Return To Menu
  </button>
</div>
  </div>

  <div id="upgradeUI" class="upgrade-ui">
  <h3>Upgrade Tower</h3>

  <p id="towerInfo"></p>

  <button onclick="upgradeTower()">
    Upgrade Tower
  </button>

  <button onclick="sellTower()">
    Sell Tower
  </button>

  <button onclick="closeUpgradeUI()">
    Close
  </button>
</div>

  <script src="script.js"></script>
</body>
</html>
